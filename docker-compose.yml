version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cardealership-db
    environment:
      POSTGRES_DB: cardealership
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealership_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cardealership-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cardealership
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dealership_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cardealership-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dealership_network

volumes:
  pgdata:

networks:
  dealership_network:
    driver: bridge
